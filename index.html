<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KonfusionKing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Arial', sans-serif;
    background: #0b0b2a; /* plain dark blue background */
    color: #fff;
    overflow: hidden;
    height: 100vh;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  /* Countdown numbers */
  #countdown {
    font-size: 5em;
    color: #f0e130;
    text-shadow: 2px 2px 5px #000;
    animation: none;
  }

  /* Rocket */
  #rocket {
    position: absolute;
    width: 120px;
    bottom: 20px;
    transition: all 3s ease-in-out;
  }

  /* Text container */
  #content {
    text-align: center;
    opacity: 0;
    transition: opacity 2s ease;
  }

  h1 {
    font-size: 3em;
    margin-bottom: 20px;
    color: #f0e130;
    text-shadow: 2px 2px 5px #000;
  }

  p {
    font-size: 1.2em;
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.5;
    color: #c0c0ff;
  }
</style>
</head>
<body>

<!-- Countdown -->
<div id="countdown">5</div>

<!-- Rocket -->
<img id="rocket" src="rocket.jpg" alt="rocket">

<!-- Main Content -->
<div id="content">
  <h1>Welcome to KonfusionKing</h1>
  <p>Step into the konfusing world of kode, kreativity, and kuriosity. Explore, create, and let your imagination launch like a rocket!</p>
</div>

<script>
const countdownEl = document.getElementById('countdown');
const rocket = document.getElementById('rocket');
const content = document.getElementById('content');

let count = 5;
countdownEl.textContent = count;

const countdownInterval = setInterval(() => {
    count--;
    if (count > 0) {
        countdownEl.textContent = count;
    } else {
        clearInterval(countdownInterval);
        countdownEl.style.display = 'none';

        // Move rocket up
        rocket.style.bottom = '100%';

        // Show content after rocket flies
        setTimeout(() => {
            content.style.opacity = 1;
        }, 3000); // match the rocket transition
    }
}, 1000);
</script>

</body>
</html>
