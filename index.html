<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KonfusionKing</title>
<style>
  /* Reset and basic styles */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Arial', sans-serif;
    background: #0b0b2a;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    position: relative;
  }

  /* Stars background */
  body::before {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    background: transparent url('stars.jpg') repeat;
    animation: moveStars 60s linear infinite;
    z-index: -1;
  }

  @keyframes moveStars {
    from { transform: translate(0, 0); }
    to { transform: translate(-50%, -50%); }
  }

  /* Rocket animation */
  #rocket {
    position: absolute;
    width: 120px;
    bottom: -150px;
    left: -150px;
    animation: fly 4s ease-out forwards;
    z-index: 2;
  }

  @keyframes fly {
    0% { bottom: -150px; left: -150px; transform: rotate(0deg) scale(0.5); }
    50% { bottom: 50%; left: 50%; transform: rotate(20deg) scale(1); }
    100% { bottom: 110%; left: 110%; transform: rotate(45deg) scale(1.2); }
  }

  /* Text container */
  #content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 0;
    animation: fadeIn 2s ease 4s forwards; /* starts after rocket */
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  h1 {
    font-size: 3em;
    margin-bottom: 20px;
    color: #f0e130;
    text-shadow: 2px 2px 5px #000;
    animation: bounce 2s ease 4s forwards;
    opacity: 0;
  }

  p {
    font-size: 1.2em;
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.5;
    color: #c0c0ff;
    animation: fadeText 2s ease 4.5s forwards;
    opacity: 0;
  }

  @keyframes bounce {
    0% { transform: translateY(-50%) scale(0.5); opacity: 0; }
    60% { transform: translateY(-55%) scale(1.1); opacity: 1; }
    100% { transform: translateY(-50%) scale(1); opacity: 1; }
  }

  @keyframes fadeText {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<!-- Rocket -->
<img id="rocket" src="rocket.jpg" alt="rocket">

<!-- Main Content -->
<div id="content">
  <h1>Welcome to KonfusionKing</h1>
  <p>Step into the konfusing world of kode, kreativity, and kuriosity. Explore, create, and let your imagination launch like a rocket!</p>
</div>

</body>
</html>
